name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # 生成 .env（所有配置模块都需要）
          cp .env.example .env

      - name: Run core tests (fast, mocked)
        env:
          HF_HUB_OFFLINE: "1"
        run: |
          python -m pytest tests/test_query_rewriter.py -v --tb=short
          python -m pytest tests/test_hybrid_retriever.py -v --tb=short
          python -m pytest tests/test_escalation_handler.py -v --tb=short
          python -m pytest tests/test_evaluation.py -v --tb=short
          python -m pytest tests/test_observability.py -v --tb=short

      - name: Run safety & hallucination tests
        env:
          HF_HUB_OFFLINE: "1"
        run: |
          python -m pytest tests/test_safety_enforcer.py -v --tb=short -k "not L2"
          python -m pytest tests/test_hallucination_guard.py -v --tb=short
          python -m pytest tests/test_context_compressor.py -v --tb=short

      - name: Run full test suite
        env:
          HF_HUB_OFFLINE: "1"
        if: success()
        run: python -m pytest tests/ -v --tb=short -x

